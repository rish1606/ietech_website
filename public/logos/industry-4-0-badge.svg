<svg xmlns="http://www.w3.org/2000/svg" width="244" height="64" viewBox="0 0 244 64" role="img" aria-labelledby="title desc">
  <title id="title">Industry 4.0 badge</title>
  <desc id="desc">Stylized icon representing connected manufacturing and automation.</desc>
  <defs>
    <linearGradient id="i40-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="i40-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#103651"/>
      <stop offset="100%" stop-color="#1d75b8"/>
    </linearGradient>
    <linearGradient id="i40-node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5db6ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="242" height="62" rx="16" fill="url(#i40-bg)" stroke="#cfe1f2"/>

  <g transform="translate(17 10)">
    <circle cx="21" cy="21" r="13" fill="none" stroke="url(#i40-accent)" stroke-width="3"/>
    <circle cx="21" cy="21" r="4" fill="#103651"/>

    <rect x="19.8" y="1" width="2.4" height="5" rx="1" fill="#103651"/>
    <rect x="19.8" y="36" width="2.4" height="5" rx="1" fill="#103651"/>
    <rect x="1" y="19.8" width="5" height="2.4" rx="1" fill="#103651"/>
    <rect x="36" y="19.8" width="5" height="2.4" rx="1" fill="#103651"/>

    <circle cx="58" cy="10" r="3.5" fill="url(#i40-node)"/>
    <circle cx="70" cy="21" r="3.5" fill="url(#i40-node)"/>
    <circle cx="58" cy="32" r="3.5" fill="url(#i40-node)"/>

    <path d="M33 15H54" stroke="#1d75b8" stroke-width="2" stroke-linecap="round"/>
    <path d="M33 21H66" stroke="#1d75b8" stroke-width="2" stroke-linecap="round"/>
    <path d="M33 27H54" stroke="#1d75b8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(103 19)" fill="url(#i40-accent)">
    <text x="0" y="16" font-size="18" font-family="Helvetica, Arial, sans-serif" font-weight="700" letter-spacing="0.6">INDUSTRY 4.0</text>
    <text x="0" y="32" font-size="9" font-family="Helvetica, Arial, sans-serif" font-weight="600" fill="#4c6a83" letter-spacing="1.2">CONNECTED SYSTEMS</text>
  </g>
</svg>
