<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="author" content="i.e tech" />
  <!--
    Page title and all SEO/social meta (description, canonical, robots, Open Graph,
    Twitter, JSON-LD) are rendered per-route by the Seo component using React 19
    native document metadata, which hoists them into the head. The prerenderer captures
    them into each page's static HTML. The title element is intentionally omitted here
    so React owns it and prerendered pages carry exactly one (correct) title.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Load webfont CSS without blocking first paint, then fall back for no-JS. -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
  </noscript>
  <script>
    (() => {
      try {
        const savedMode = localStorage.getItem('theme-mode');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const mode = savedMode === 'light' || savedMode === 'dark' || savedMode === 'system'
          ? savedMode
          : 'system';
        const isDark = mode === 'system' ? prefersDark : mode === 'dark';
        document.documentElement.classList.toggle('dark', isDark);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      } catch {
        // No-op: fallback to CSS defaults.
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
