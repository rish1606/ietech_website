# Security headers shared across all locations.
# `always` ensures they are emitted on error responses too.
#
# NOTE ON CSP: script-src/style-src currently allow 'unsafe-inline' because
# index.html ships an inline theme-init snippet and the UI libraries
# (framer-motion, three.js) inject inline styles. This is still a large
# improvement over having no CSP. To tighten later, replace 'unsafe-inline'
# in script-src with a per-response nonce or the sha256 hash of the inline
# script. The allow-listed hosts cover Google Fonts, Firebase Auth,
# Firestore and Google Analytics — keep them in sync with the app's SDKs.

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; upgrade-insecure-requests; img-src 'self' data: https:; media-src 'self'; worker-src 'self' blob:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://www.gstatic.com https://www.googletagmanager.com; connect-src 'self' https://*.googleapis.com https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://firebaseinstallations.googleapis.com; frame-src 'self' https://ietech-ai.firebaseapp.com https://accounts.google.com https://apis.google.com; form-action 'self'" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
