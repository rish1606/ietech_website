server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Enforce HTTPS behind proxies/load balancers.
  # Cloud Run terminates TLS upstream, so rely on forwarded scheme headers.
  set $redirect_to_https 0;
  if ($http_x_forwarded_proto = "http") {
    set $redirect_to_https 1;
  }
  if ($http_cf_visitor ~ "\"scheme\":\"http\"") {
    set $redirect_to_https 1;
  }
  if ($redirect_to_https = 1) {
    return 301 https://$host$request_uri;
  }

  # Gzip compression for text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  # Vite hashed assets: cache aggressively
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    include /etc/nginx/security-headers.conf;
  }

  # Static files
  location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    include /etc/nginx/security-headers.conf;
  }

  # Admin is a client-only route (not prerendered, noindex). Always serve the
  # SPA shell so React can render it after auth.
  location /admin {
    try_files /index.html =404;
    add_header Cache-Control "no-cache";
    include /etc/nginx/security-headers.conf;
  }

  # CMS-driven detail routes. A prerendered post is served as a real file; a slug
  # that isn't prerendered yet (a new post published since the last build) falls back
  # to the pristine SPA shell so the client renders it immediately instead of 404ing.
  # A genuinely nonexistent slug renders the in-app "not found" state, which is
  # marked noindex so it isn't indexed.
  location /blog/ {
    try_files $uri $uri/ /_shell.html;
    add_header Cache-Control "no-cache";
    include /etc/nginx/security-headers.conf;
  }
  location /project/ {
    try_files $uri $uri/ /_shell.html;
    add_header Cache-Control "no-cache";
    include /etc/nginx/security-headers.conf;
  }

  # Prerendered pages are real files (e.g. /blogs/index.html, /blog/<slug>/index.html).
  # Serve them directly; any other path with no matching file returns a real 404
  # (correct for crawlers) instead of a soft-200 SPA shell.
  location / {
    try_files $uri $uri/ =404;
    add_header Cache-Control "no-cache";
    include /etc/nginx/security-headers.conf;
  }

  # Prerendered 404 document, returned with a real 404 status.
  error_page 404 /404.html;
  location = /404.html {
    internal;
    add_header Cache-Control "no-cache";
    include /etc/nginx/security-headers.conf;
  }
}
