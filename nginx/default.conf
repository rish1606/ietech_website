server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Enforce HTTPS behind proxies/load balancers.
  # Cloud Run terminates TLS upstream, so rely on forwarded scheme headers.
  set $redirect_to_https 0;
  if ($http_x_forwarded_proto = "http") {
    set $redirect_to_https 1;
  }
  if ($http_cf_visitor ~ "\"scheme\":\"http\"") {
    set $redirect_to_https 1;
  }
  if ($redirect_to_https = 1) {
    return 301 https://$host$request_uri;
  }

  # Gzip compression for text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  # Vite hashed assets: cache aggressively
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Static files
  location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
